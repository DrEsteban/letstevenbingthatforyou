    <script>
        (function () {
            function updateMobileLayoutScale() {
                var widgetWidth = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--mobile-widget-width")) || 720;
                var horizontalPadding = 32;
                var viewportWidth = window.visualViewport ? window.visualViewport.width : window.innerWidth;
                var availableWidth = Math.max(0, viewportWidth - horizontalPadding);
                var scale = availableWidth > 0 ? Math.min(1, availableWidth / widgetWidth) : 1;

                document.documentElement.style.setProperty("--mobile-layout-scale", scale.toString());
            }

            window.addEventListener("resize", updateMobileLayoutScale);
            window.addEventListener("orientationchange", updateMobileLayoutScale);
            updateMobileLayoutScale();
        })();
    </script>
